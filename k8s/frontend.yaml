apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kubex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 164092712009.dkr.ecr.ap-southeast-1.amazonaws.com/kubex/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: kubex
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
