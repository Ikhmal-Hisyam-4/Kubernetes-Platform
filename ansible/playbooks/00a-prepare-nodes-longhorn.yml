---
# Prepare RKE2 nodes for Longhorn — install required packages
# Run: ansible-playbook playbooks/00a-prepare-nodes-longhorn.yml

- name: Prepare nodes for Longhorn
  hosts: rke2_nodes
  gather_facts: false
  become: true

  tasks:
    - name: Install open-iscsi and nfs-utils
      ansible.builtin.dnf:
        name:
          - iscsi-initiator-utils
          - nfs-utils
        state: present

    - name: Enable and start iscsid service
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    - name: Confirm iscsiadm is available
      ansible.builtin.command: iscsiadm --version
      register: iscsi_version
      changed_when: false

    - name: Show iscsiadm version
      debug:
        msg: "{{ inventory_hostname }}: {{ iscsi_version.stdout }}"
