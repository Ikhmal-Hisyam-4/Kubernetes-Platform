---
# Verify Monitoring Stack is healthy
# Run: ansible-playbook playbooks/02-verify-monitoring.yml

- name: Verify Monitoring Stack
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Get all pods in monitoring namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: "{{ monitoring_namespace }}"
      register: monitoring_pods

    - name: Show pod status
      debug:
        msg: "{{ item.metadata.name }} — {{ item.status.phase }}"
      loop: "{{ monitoring_pods.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Assert all pods are Running
      assert:
        that: item.status.phase == "Running"
        fail_msg: "Pod {{ item.metadata.name }} is NOT Running ({{ item.status.phase }})"
      loop: "{{ monitoring_pods.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Get PVCs in monitoring namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: PersistentVolumeClaim
        namespace: "{{ monitoring_namespace }}"
      register: monitoring_pvcs

    - name: Show PVC status
      debug:
        msg: "{{ item.metadata.name }} — {{ item.status.phase }} ({{ item.spec.resources.requests.storage }})"
      loop: "{{ monitoring_pvcs.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Assert all PVCs are Bound
      assert:
        that: item.status.phase == "Bound"
        fail_msg: "PVC {{ item.metadata.name }} is NOT Bound"
      loop: "{{ monitoring_pvcs.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Show final access info
      debug:
        msg: |
          ============================================
          Verification Passed!
          ============================================
          Grafana : http://10.10.30.10:{{ grafana_node_port }}
          Login   : admin / {{ grafana_admin_password }}
          ============================================
