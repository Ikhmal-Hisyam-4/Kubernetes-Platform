---
# Install Longhorn Storage on RKE2
# Run: ansible-playbook playbooks/00-install-longhorn.yml

- name: Install Longhorn Storage on RKE2
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Create longhorn-system namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: longhorn-system
            labels:
              environment: lab
              managed_by: ansible

    - name: Add Longhorn Helm repo
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io

    - name: Deploy Longhorn
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: longhorn
        chart_ref: longhorn/longhorn
        chart_version: "{{ longhorn_version }}"
        release_namespace: longhorn-system
        wait: true
        wait_timeout: 600s
        values:
          defaultSettings:
            defaultReplicaCount: 2
          persistence:
            defaultClass: true
            defaultClassReplicaCount: 2

    - name: Verify Longhorn StorageClass exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: StorageClass
        name: longhorn
      register: longhorn_sc
      retries: 12
      delay: 15
      until: longhorn_sc.resources | length > 0

    - name: Show Longhorn status
      debug:
        msg: |
          ============================================
          Longhorn Installed!
          ============================================
          StorageClass : longhorn (default)
          Namespace    : longhorn-system
          Replicas     : 2
          ============================================
