---
# Deploy Monitoring Stack: Prometheus + Grafana + Loki
# Run: ansible-playbook playbooks/01-deploy-monitoring.yml --extra-vars "grafana_admin_password=YourPassword"

- name: Deploy Monitoring Stack on RKE2
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ monitoring_namespace }}"
            labels:
              environment: lab
              managed_by: ansible

    - name: Add prometheus-community Helm repo
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: https://prometheus-community.github.io/helm-charts

    - name: Add grafana Helm repo
      kubernetes.core.helm_repository:
        name: grafana
        repo_url: https://grafana.github.io/helm-charts

    - name: Deploy kube-prometheus-stack
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: "{{ kube_prometheus_stack_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        wait: true
        wait_timeout: 600s
        values:
          prometheus:
            prometheusSpec:
              retention: "{{ prometheus_retention }}"
              resources:
                requests:
                  memory: 512Mi
                limits:
                  memory: 1500Mi
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "{{ storage_class }}"
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: "{{ prometheus_storage_size }}"

          grafana:
            adminPassword: "{{ grafana_admin_password }}"
            service:
              type: NodePort
              nodePort: "{{ grafana_node_port }}"
            persistence:
              enabled: true
              storageClassName: "{{ storage_class }}"
              size: "{{ grafana_storage_size }}"
              accessModes:
                - ReadWriteOnce
            additionalDataSources:
              - name: Loki
                type: loki
                url: "http://loki.{{ monitoring_namespace }}.svc.cluster.local:3100"
                access: proxy
                isDefault: false

          alertmanager:
            enabled: true

    - name: Deploy Loki
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: loki
        chart_ref: grafana/loki
        chart_version: "{{ loki_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        wait: true
        wait_timeout: 600s
        values:
          deploymentMode: SingleBinary
          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            storage:
              type: filesystem
            limits_config:
              retention_period: "{{ loki_retention_hours }}"
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              storageClass: "{{ storage_class }}"
              size: "{{ loki_storage_size }}"
          backend:
            replicas: 0
          read:
            replicas: 0
          write:
            replicas: 0
          gateway:
            enabled: false
          chunksCache:
            enabled: false
          resultsCache:
            enabled: false
          lokiCanary:
            enabled: false
          test:
            enabled: false
          monitoring:
            selfMonitoring:
              enabled: false
              grafanaAgent:
                installOperator: false

    - name: Deploy Promtail
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: promtail
        chart_ref: grafana/promtail
        chart_version: "{{ promtail_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        wait: true
        wait_timeout: 300s
        values:
          podSecurityContext:
            runAsUser: 0
            runAsGroup: 0
          containerSecurityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: true
            privileged: true
          config:
            clients:
              - url: "http://loki.{{ monitoring_namespace }}.svc.cluster.local:3100/loki/api/v1/push"

    - name: Show Grafana access info
      debug:
        msg: |
          ============================================
          Monitoring Stack Deployed!
          ============================================
          Grafana URL : http://10.10.30.10:{{ grafana_node_port }}
          Username    : admin
          Password    : {{ grafana_admin_password }}
          ============================================
