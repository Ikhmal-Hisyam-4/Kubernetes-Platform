---
# Kubernetes Platform — Application Deployment
# Run: ansible-playbook site.yml --extra-vars "grafana_admin_password=YourPassword"

- name: Kubernetes Platform Deployment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display deployment plan
      debug:
        msg: |
          ============================================
          KUBERNETES PLATFORM — APP DEPLOYMENT
          ============================================
          Cluster : rgx-cluster (RKE2 on Harvester)
          Nodes   : rgx-node-01/02/03 (10.10.30.10-12)
          Stack   : Prometheus + Grafana + Loki
          ============================================

- import_playbook: playbooks/00a-prepare-nodes-longhorn.yml
  tags: [longhorn, prepare]

- import_playbook: playbooks/00-install-longhorn.yml
  tags: [longhorn, storage]

- import_playbook: playbooks/01-deploy-monitoring.yml
  tags: [monitoring, deploy]

- import_playbook: playbooks/02-verify-monitoring.yml
  tags: [monitoring, verify]
