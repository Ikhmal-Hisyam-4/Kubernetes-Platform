version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kubex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kubex
      POSTGRES_PASSWORD: kubex_password
      POSTGRES_DB: kubex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubex -d kubex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kubex-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kubex:kubex_password@postgres:5432/kubex_db
      PORT: 3001
      FRONTEND_URL: http://localhost:80
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kubex-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
